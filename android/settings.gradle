// pluginManagement MUST be the FIRST block in the file
pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
    
    plugins {
        id "com.facebook.react.settings" version "0.74.5"
        id "org.jetbrains.kotlin.android" version "1.9.24"
    }
}

// Now you can add other blocks
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        maven {
            url "$rootDir/../node_modules/expo-modules-core/android"
        }
    }
}

// Set root project name AFTER pluginManagement
rootProject.name = 'BubbleOverlayApp'

// Handle expo autolinking - FIXED VERSION
def expoAutolinkingPath = file("../node_modules/expo-modules-core/scripts/autolinking.gradle")
if (expoAutolinkingPath.exists()) {
    // Create a safe wrapper for autolinking
    def expoSettings = settings
    gradle.ext.expoRoot = file("../")
    gradle.ext.expoModuleRegistry = [:]
    
    try {
        apply from: expoAutolinkingPath
    } catch (Exception e) {
        println "Warning: Could not apply expo autolinking: ${e.message}"
    }
} else {
    println "Warning: expo-modules-core autolinking.gradle not found, using fallback"
    gradle.ext.expoRoot = file("../")
    gradle.ext.expoModuleRegistry = [:]
}

// React Native CLI autolinking - FIXED VERSION
try {
    def cliPath = new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json')"].execute(null, rootDir).text.trim())
    def nativeModulesPath = new File(cliPath.parentFile, "../native_modules.gradle")
    if (nativeModulesPath.exists()) {
        apply from: nativeModulesPath.absolutePath
        applyNativeModulesSettingsGradle(settings)
    } else {
        println "Warning: native_modules.gradle not found"
    }
} catch (Exception e) {
    println "Warning: Could not apply React Native CLI autolinking: ${e.message}"
}

// Include app module
include ':app'

// Include React Native Gradle plugin
try {
    def rnGradlePluginPath = new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim())
    if (rnGradlePluginPath.exists()) {
        includeBuild(rnGradlePluginPath.parentFile)
    }
} catch (Exception e) {
    println "Warning: Could not include React Native Gradle plugin: ${e.message}"
}