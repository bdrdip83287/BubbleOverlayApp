rootProject.name = 'BubbleOverlayApp'

// Import autolinking with proper path
def expoModulesCorePath = file("../node_modules/expo-modules-core")
if (expoModulesCorePath.exists()) {
    apply from: file("../node_modules/expo-modules-core/scripts/autolinking.gradle")
} else {
    logger.warn("expo-modules-core not found, creating empty autolinking configuration")
    
    // Create a dummy autolinking configuration
    gradle.ext.expoRoot = file("../")
    gradle.ext.expoModuleRegistry = [:]
    
    // Define a minimal autolinking configuration
    project.ext.react = [
        entryFile: "index.js",
        enableHermes: true
    ]
}

