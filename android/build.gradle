buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

/**
 * 🔥 FORCE replace old Android Support Library with AndroidX globally
 */
subprojects {
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module("com.android.support:support-compat") using module("androidx.core:core:1.13.1")
            substitute module("com.android.support:support-v4") using module("androidx.core:core:1.13.1")
        }

        exclude group: "com.android.support"
    }
}
