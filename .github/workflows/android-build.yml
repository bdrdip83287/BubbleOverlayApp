name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx react-native config

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ নতুন স্টেপ ১: ReactNative মডিউলের পাথ চেক ও symlink তৈরি
      - name: Fix React Native Android path
        run: |
          echo "=== 🔍 Checking React Native Android path ==="
          # প্রয়োজনীয় ডিরেক্টরি তৈরি
          mkdir -p android/node_modules/react-native
          
          # যদি symlink/ফোল্ডার না থাকে, তাহলে তৈরি করুন
          if [ ! -e android/node_modules/react-native/ReactAndroid ]; then
            echo "Creating symlink for ReactAndroid..."
            ln -sf ../../../node_modules/react-native/ReactAndroid android/node_modules/react-native/ReactAndroid
          fi
          
          # ডিরেক্টরি লিস্টিং দেখুন (ডিবাগিংয়ের জন্য)
          echo "=== 📁 Directory structure ==="
          ls -la android/node_modules/ || echo "android/node_modules not found"
          ls -la android/node_modules/react-native/ 2>/dev/null || echo "react-native symlink not found"
          ls -la android/node_modules/react-native/ReactAndroid/ 2>/dev/null || echo "ReactAndroid not found"

      # ✅ নতুন স্টেপ ২: Gradle প্রপার্টি ফাইল চেক
      - name: Verify gradle.properties
        run: |
          echo "=== 🔍 Checking gradle.properties files ==="
          # মূল প্রকল্পের gradle.properties
          if [ -f "android/gradle.properties" ]; then
            echo "✅ android/gradle.properties exists"
            cat android/gradle.properties | grep -v "^#" | head -10
          else
            echo "❌ android/gradle.properties not found!"
          fi
          
          # React Native-এর gradle.properties (যেটা খুঁজছে)
          if [ -f "android/node_modules/react-native/ReactAndroid/gradle.properties" ]; then
            echo "✅ ReactAndroid/gradle.properties exists (via symlink)"
          else
            echo "⚠️ ReactAndroid/gradle.properties not found, but symlink should handle it."
          fi

      - name: Verify manifest files
        run: |
          echo "=== 📁 Checking manifest files ==="
          echo "Main manifest:"
          cat android/app/src/main/AndroidManifest.xml | head -10
          echo ""
          echo "Debug manifest:"
          cat android/app/src/debug/AndroidManifest.xml 2>/dev/null || echo "Debug manifest not found"
          echo ""

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "=== 🏗️ Cleaning old build ==="
          ./gradlew clean
          echo "=== 🚀 Building Debug APK ==="
          # --no-daemon ব্যবহার করা হচ্ছে daemon সংক্রান্ত সমস্যা এড়াতে
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingBubbleApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
