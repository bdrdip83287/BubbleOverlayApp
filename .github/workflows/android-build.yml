name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx react-native config

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create assets directory
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/debug
          mkdir -p android/app/src/release

      - name: Bundle JS
        run: |
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Fix React Native Android path
        run: |
          mkdir -p android/node_modules/react-native
          if [ ! -e android/node_modules/react-native/ReactAndroid ]; then
            ln -sf ../../../node_modules/react-native/ReactAndroid android/node_modules/react-native/ReactAndroid
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingBubbleApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
