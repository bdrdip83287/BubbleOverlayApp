name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx react-native config

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create assets directory
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/debug
          mkdir -p android/app/src/release

      - name: Bundle JS
        run: |
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      # ✅ ফিক্স: React Native Android path সঠিকভাবে তৈরি করুন
      - name: Fix React Native Android path
        run: |
          echo "=== 📁 Creating React Native Android symlink ==="
          # প্রয়োজনীয় ডিরেক্টরি তৈরি
          mkdir -p android/node_modules/react-native
          
          # ReactAndroid ফোল্ডারের জন্য symlink তৈরি
          if [ ! -e android/node_modules/react-native/ReactAndroid ]; then
            ln -sf ../../../node_modules/react-native/ReactAndroid android/node_modules/react-native/ReactAndroid
            echo "✅ Created symlink for ReactAndroid"
          fi
          
          # react.gradle ফাইলের জন্য symlink তৈরি
          if [ ! -e android/node_modules/react-native/react.gradle ]; then
            ln -sf ../../../node_modules/react-native/react.gradle android/node_modules/react-native/react.gradle
            echo "✅ Created symlink for react.gradle"
          fi
          
          # ডিরেক্টরি স্ট্রাকচার চেক
          echo "=== 📁 Directory structure ==="
          ls -la android/node_modules/ || echo "android/node_modules not found"
          ls -la android/node_modules/react-native/ 2>/dev/null || echo "react-native symlink not found"
          ls -la android/node_modules/react-native/ReactAndroid/ 2>/dev/null || echo "ReactAndroid symlink not found"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingBubbleApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ⭐⭐⭐ সম্পূর্ণ সোর্স কোড ব্যাকআপ - নতুন সংযোজন ⭐⭐⭐
      
      - name: Prepare source code backup
        run: |
          # ব্যাকআপের জন্য একটি ডিরেক্টরি তৈরি
          mkdir -p source-backup
          
          # গুরুত্বপূর্ণ ফাইল ও ফোল্ডার কপি (node_modules ও build ফোল্ডার বাদে)
          cp -r android source-backup/ 2>/dev/null || true
          cp -r src source-backup/ 2>/dev/null || true
          cp -r components source-backup/ 2>/dev/null || true
          cp -r screens source-backup/ 2>/dev/null || true
          cp -r utils source-backup/ 2>/dev/null || true
          cp -r hooks source-backup/ 2>/dev/null || true
          cp -r constants source-backup/ 2>/dev/null || true
          cp -r assets source-backup/ 2>/dev/null || true
          cp -r ios source-backup/ 2>/dev/null || true
          
          # রুট ফাইলগুলো কপি
          cp *.js source-backup/ 2>/dev/null || true
          cp *.json source-backup/ 2>/dev/null || true
          cp *.md source-backup/ 2>/dev/null || true
          cp .env* source-backup/ 2>/dev/null || true
          cp .babelrc* source-backup/ 2>/dev/null || true
          cp .eslintrc* source-backup/ 2>/dev/null || true
          cp .prettierrc* source-backup/ 2>/dev/null || true
          cp .watchmanconfig* source-backup/ 2>/dev/null || true
          cp metro.config.js source-backup/ 2>/dev/null || true
          cp app.json source-backup/ 2>/dev/null || true
          cp index.js source-backup/ 2>/dev/null || true
          
          # ব্যাকআপ জিপ করুন
          cd source-backup
          tar -czf ../full-source-backup-${{ github.sha }}.tar.gz .
          cd ..

      - name: Upload full source code backup
        uses: actions/upload-artifact@v4
        if: always()  # বিল্ড সফল বা ব্যর্থ উভয় ক্ষেত্রেই ব্যাকআপ রাখবে
        with:
          name: full-source-backup-${{ github.sha }}
          path: full-source-backup-${{ github.sha }}.tar.gz
          retention-days: 90  # ৯০ দিন পর্যন্ত রাখবে
          if-no-files-found: warn

      # 📁 ফোল্ডার ভিত্তিক আলাদা ব্যাকআপ
      
      - name: Upload Android source separately
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-source-backup-${{ github.sha }}
          path: |
            android/app/src/main/
            android/app/build.gradle
            android/build.gradle
            android/settings.gradle
            android/gradle.properties
            !android/app/src/main/assets/index.android.bundle
            !**/build/
          retention-days: 90

      - name: Upload React Native source separately
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: react-source-backup-${{ github.sha }}
          path: |
            src/
            components/
            screens/
            utils/
            hooks/
            constants/
            App.js
            index.js
            package.json
          retention-days: 90

      # 📝 ব্যাকআপের তথ্য সংরক্ষণ
      
      - name: Save backup information
        run: |
          echo "=== Backup Information ===" > backup-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> backup-info.txt
          echo "Commit Message: ${{ github.event.head_commit.message }}" >> backup-info.txt
          echo "Build Date: $(date)" >> backup-info.txt
          echo "Branch: ${{ github.ref_name }}" >> backup-info.txt
          echo "Workflow: ${{ github.workflow }}" >> backup-info.txt
          echo "========================" >> backup-info.txt
          
          # ফাইল লিস্ট সংরক্ষণ
          find . -type f -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/build/*" -not -path "*/dist/*" | sort > file-list.txt
          
          # গুরুত্বপূর্ণ ফাইলের কন্টেন্টের স্যাম্পল সংরক্ষণ
          echo "=== Important Files Content Samples ===" >> important-samples.txt
          for file in android/app/src/main/AndroidManifest.xml android/app/build.gradle package.json App.js; do
            if [ -f "$file" ]; then
              echo "--- $file ---" >> important-samples.txt
              head -50 "$file" >> important-samples.txt
              echo "" >> important-samples.txt
            fi
          done

      - name: Upload backup information
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backup-info-${{ github.sha }}
          path: |
            backup-info.txt
            file-list.txt
            important-samples.txt
          retention-days: 90
