name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          # Ensure expo-modules-core is installed
          npx expo install expo-modules-core --fix

      - name: Verify autolinking file
        run: |
          ls -la node_modules/expo-modules-core/scripts/ || echo "Directory not found"
          # Create directory if missing
          mkdir -p node_modules/expo-modules-core/scripts/
          touch node_modules/expo-modules-core/scripts/autolinking.gradle

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Clean and Build
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
