name: Expo Android CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Install dependencies (safe for legacy-peer-deps)
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ Login to Expo (non-interactive)
      - name: Expo Login
        run: npx expo login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 5️⃣ Prebuild Android (expo prebuild)
      - name: Expo Prebuild Android
        run: npx expo prebuild --platform android --clean

      # 6️⃣ Build APK / AAB (Release)
      - name: Build Android App
        run: npx eas build --platform android --profile release --non-interactive

      # 7️⃣ Upload artifact (APK/AAB) to GitHub Actions
      - name: Upload APK/AAB
        uses: actions/upload-artifact@v3
        with:
          name: android-build
          path: |
            ./android/app/build/outputs/**/*.apk
            ./android/app/build/outputs/**/*.aab
