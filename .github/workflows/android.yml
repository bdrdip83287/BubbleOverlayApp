name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          # Ensure expo-modules-core is installed
          npm install expo-modules-core@~1.12.0

      - name: Verify and create autolinking file
        run: |
          mkdir -p node_modules/expo-modules-core/scripts/
          if [ ! -f node_modules/expo-modules-core/scripts/autolinking.gradle ]; then
            echo "// Autolinking configuration" > node_modules/expo-modules-core/scripts/autolinking.gradle
            echo "gradle.ext.expoRoot = project.rootProject.projectDir.parentFile" >> node_modules/expo-modules-core/scripts/autolinking.gradle
            echo "gradle.ext.expoModuleRegistry = [:]" >> node_modules/expo-modules-core/scripts/autolinking.gradle
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Clean
        run: |
          cd android
          ./gradlew clean

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
