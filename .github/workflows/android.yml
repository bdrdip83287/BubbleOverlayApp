name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # আপনার project node version

      # 3️⃣ Install npm dependencies
      - name: Install npm dependencies
        run: npm install

      # 4️⃣ Expo prebuild (Android-only)
      - name: Expo prebuild sync (Android-only)
        run: EXPO_SKIP_IOS_BUILD=true npx expo prebuild

      # 5️⃣ Setup Java 17 (Gradle compatible)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6️⃣ Make gradlew executable
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # 7️⃣ Build Release APK
      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease

      # 8️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

