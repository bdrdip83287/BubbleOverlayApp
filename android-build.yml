name: Android Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --force
          npm list --depth=0

      - name: Create necessary directories
        run: |
          mkdir -p android/app/src/debug
          mkdir -p android/app/src/debugOptimized

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: |
          cd android
          chmod +x gradlew
          cd ..

      - name: Clean old builds
        run: |
          cd android
          ./gradlew clean
          cd ..

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
          cd ..

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BubbleOverlayApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (if secrets exist)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Check if keystore secret exists
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "🔐 Keystore found, building signed APK..."
            
            # Decode keystore
            echo $KEYSTORE_BASE64 | base64 --decode > android/app/my-release-key.keystore
            
            # Create keystore.properties
            cat > android/keystore.properties << EOF
            storePassword=$KEYSTORE_PASSWORD
            keyPassword=$KEY_PASSWORD
            keyAlias=$KEY_ALIAS
            storeFile=my-release-key.keystore
            EOF
            
            cd android
            ./gradlew assembleRelease
            cd ..
            
            echo "✅ Release APK built successfully!"
          else
            echo "⚠️ No keystore found, skipping release build"
          fi

      - name: Upload Release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: BubbleOverlayApp-Release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Get APK Size
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -h "android/app/build/outputs/apk/debug/app-debug.apk" | cut -f1)
            echo "📦 Debug APK Size: $SIZE"
          fi
