name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx react-native config

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify manifest files
        run: |
          echo "=== 📁 Checking manifest files ==="
          echo "Main manifest:"
          cat android/app/src/main/AndroidManifest.xml | head -10
          echo ""
          echo "Debug manifest:"
          cat android/app/src/debug/AndroidManifest.xml
          echo ""
          echo "=== 🔍 Looking for debugOptimized ==="
          ls -la android/app/src/ | grep debugOptimized && echo "❌ debugOptimized still exists!" || echo "✅ No debugOptimized folder - good!"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "=== 🏗️ Cleaning old build ==="
          ./gradlew clean
          echo "=== 🚀 Building Debug APK ==="
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingBubbleApp-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
